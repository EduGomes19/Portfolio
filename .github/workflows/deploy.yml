name: Deploy React Site to Pages

on:
  push:
    branches: ["main"] # Roda a cada push na branch main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Gerar Build (Vite)
        run: npm run build

      - name: Upload para o GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Pasta onde o Vite coloca o site pronto

      - name: Deploy Final
        uses: actions/deploy-pages@v4